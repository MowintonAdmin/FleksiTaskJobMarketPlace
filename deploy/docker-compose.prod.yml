services:
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fleksitask}
      POSTGRES_USER: ${POSTGRES_USER:-fleksi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  backend:
    env_file:
      - ./backend/.env
    environment:
      # Override ALLOWED_ORIGINS so the production frontend domains are permitted.
      # Set BACKEND_ALLOWED_ORIGINS in deploy/.env.prod, e.g.:
      #   BACKEND_ALLOWED_ORIGINS=["https://flekxi.my","https://www.flekxi.my","https://admin.flekxi.my"]
      ALLOWED_ORIGINS: ${BACKEND_ALLOWED_ORIGINS:-["http://localhost:3000"]}
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8000}:8000"
    restart: unless-stopped

  frontend-web:
    build:
      args:
        VITE_API_BASE_URL: ${WEB_VITE_API_BASE_URL:-https://api.yourdomain.com}
        VITE_GOOGLE_CLIENT_ID: ${WEB_VITE_GOOGLE_CLIENT_ID:-}
    environment:
      VITE_API_BASE_URL: ${WEB_VITE_API_BASE_URL:-}
      VITE_GOOGLE_CLIENT_ID: ${WEB_VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "${WEB_BIND_HOST:-127.0.0.1}:${WEB_HOST_PORT:-3000}:80"
    restart: unless-stopped

  admin:
    build:
      args:
        VITE_API_BASE_URL: ${ADMIN_VITE_API_BASE_URL:-https://api.yourdomain.com}
    ports:
      - "${ADMIN_BIND_HOST:-127.0.0.1}:${ADMIN_HOST_PORT:-3001}:80"
    restart: unless-stopped